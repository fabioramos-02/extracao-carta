name: BI — Cartas com PDF e Vídeo

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"   # toda segunda-feira às 06h UTC

permissions:
  contents: write   # necessário para publicar no gh-pages

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências Python
        run: pip install psycopg2-binary python-dotenv openpyxl jinja2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar Design System MS
        run: npm install @design-system-ms/ds-sis

      - name: Localizar CSS do Design System
        id: ds
        run: |
          CSS=$(node -e "console.log(require.resolve('@design-system-ms/ds-sis/css'))" 2>/dev/null \
                || find node_modules/@design-system-ms/ds-sis -name "*.css" | head -1)
          echo "css_path=$CSS" >> "$GITHUB_OUTPUT"

      - name: Extrair cartas do banco
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_NAME: ${{ secrets.DB_NAME }}
        run: |
          python scripts/extract_cartas_pdf_video.py \
            --out /tmp/cartas-pdf-video.xlsx

      - name: Gerar BI HTML
        run: |
          python scripts/generate_bi.py \
            --in  /tmp/cartas-pdf-video.xlsx \
            --ds-css "${{ steps.ds.outputs.css_path }}" \
            --out /tmp/bi/index.html

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: /tmp/bi
          destination_dir: bi-cartas-pdf-video
          commit_message: "chore: atualiza BI cartas-pdf-video"
