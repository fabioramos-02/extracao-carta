name: BI — Cartas com PDF e Vídeo

# Publica o HTML estático pré-gerado localmente.
# Nenhuma credencial de banco é usada aqui.
# Para atualizar o relatório: rode os scripts localmente, commite e faça push.
#
#   python scripts/extract_cartas_pdf_video.py
#   python scripts/generate_bi.py --ds-css node_modules/@design-system-ms/ds-sis/css/ds-sis.css
#   git add demandas/2026-06/006-cartas-pdf-video/output/cartas-pdf-video.xlsx \
#           demandas/2026-06/006-cartas-pdf-video/bi/index.html
#   git commit -m "chore: atualiza BI cartas-pdf-video"
#   git push

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: demandas/2026-06/006-cartas-pdf-video/bi
          destination_dir: bi-cartas-pdf-video
          commit_message: "chore: deploy BI cartas-pdf-video"
